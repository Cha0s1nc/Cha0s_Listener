<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cha0s_b0t — listener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #10101a;
      --border: #1e1e30;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Barlow', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 1.1rem;
      letter-spacing: 0.05em;
    }

    .wordmark span {
      color: var(--accent2);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #ws-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    #ws-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }

    #ws-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

    .grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: auto 1fr;
      gap: 1px;
      background: var(--border);
      min-height: calc(100vh - 61px);
    }

    .panel {
      background: var(--bg);
      padding: 1.5rem;
    }

    /* Status panel */
    .status-panel {
      grid-row: 1 / 3;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .service-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: border-color 0.3s;
    }

    .service-card.connected { border-color: rgba(34, 197, 94, 0.3); }
    .service-card.disconnected { border-color: rgba(239, 68, 68, 0.2); }

    .service-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .service-name {
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .badge.ok { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge.err { background: rgba(239,68,68,0.15); color: var(--red); }

    .service-detail {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* Now playing */
    .now-playing {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }

    #now-playing-text {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent2);
      line-height: 1.5;
      min-height: 2.5rem;
      word-break: break-word;
    }

    /* Stats */
    .stats-row {
      display: flex;
      gap: 0.75rem;
    }

    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      text-align: center;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent2);
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.2rem;
    }

    /* Log panel */
    .log-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .log-filters {
      display: flex;
      gap: 0.5rem;
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(124,58,237,0.1);
    }

    #log-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: calc(100vh - 180px);
      padding-right: 4px;
    }

    #log-container::-webkit-scrollbar { width: 4px; }
    #log-container::-webkit-scrollbar-track { background: transparent; }
    #log-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry {
      display: grid;
      grid-template-columns: 80px 60px 80px 1fr auto;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.875rem;
      background: var(--surface);
      border-radius: 6px;
      border-left: 3px solid transparent;
      font-family: var(--mono);
      font-size: 0.72rem;
      animation: slideIn 0.2s ease;
      transition: opacity 0.2s;
    }

    .log-entry.hidden { display: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .log-entry.ok { border-left-color: rgba(34,197,94,0.4); }
    .log-entry.err { border-left-color: var(--red); background: rgba(239,68,68,0.05); }

    .log-time { color: var(--muted); font-size: 0.65rem; }

    .log-type {
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      text-align: center;
      font-weight: 600;
    }

    .log-type.obs { background: rgba(99,102,241,0.2); color: #818cf8; }
    .log-type.jellyfin { background: rgba(168,85,247,0.2); color: var(--accent2); }
    .log-type.sound { background: rgba(234,179,8,0.2); color: var(--yellow); }
    .log-type.system { background: rgba(100,116,139,0.2); color: var(--muted); }

    .log-command { color: var(--accent2); }
    .log-detail { color: var(--text); opacity: 0.8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-status { font-size: 0.65rem; }
    .log-status.ok { color: var(--green); }
    .log-status.err { color: var(--red); }

    /* Pulse animation for new entries */
    .pulse {
      animation: pulse 0.4s ease;
    }
    @keyframes pulse {
      0% { background: rgba(124,58,237,0.2); }
      100% { background: var(--surface); }
    }

    /* Top stats panel */
    .top-panel {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .top-inner {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .divider {
      width: 1px;
      height: 2rem;
      background: var(--border);
    }

    .top-stat {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .top-stat-val {
      font-family: var(--mono);
      font-size: 1.2rem;
      color: var(--accent2);
      font-weight: 600;
    }

    .top-stat-label {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .now-playing-inline {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .now-playing-inline .label {
      color: var(--muted);
      margin-right: 0.5rem;
    }

    /* Glow effect on header accent */
    .wordmark::before {
      content: '◈ ';
      color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <div class="wordmark">cha0s_b0t <span>/ listener</span></div>
    <div class="header-right">
      <div id="ws-indicator">
        <div id="ws-dot"></div>
        <span id="ws-label">connecting</span>
      </div>
    </div>
  </header>

  <div class="grid">
    <!-- Left: status panel -->
    <aside class="panel status-panel">
      <div>
        <div class="panel-label">Services</div>
        <div style="display:flex;flex-direction:column;gap:0.75rem;">
          <div class="service-card" id="obs-card">
            <div class="service-header">
              <span class="service-name">OBS</span>
              <span class="badge err" id="obs-badge">OFFLINE</span>
            </div>
            <div class="service-detail" id="obs-detail">WebSocket — localhost:4455</div>
          </div>
          <div class="service-card" id="jf-card">
            <div class="service-header">
              <span class="service-name">Jellyfin</span>
              <span class="badge err" id="jf-badge">OFFLINE</span>
            </div>
            <div class="service-detail" id="jf-detail">Checking...</div>
          </div>
        </div>
      </div>

      <div>
        <div class="panel-label">Now Playing</div>
        <div class="now-playing">
          <div id="now-playing-text">—</div>
        </div>
      </div>

      <div>
        <div class="panel-label">Session Stats</div>
        <div class="stats-row">
          <div class="stat">
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">Commands</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="stat-errors">0</div>
            <div class="stat-label">Errors</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Right top: filters -->
    <div class="top-panel">
      <div class="log-header">
        <div class="panel-label" style="margin:0">Command Log</div>
        <div class="log-filters">
          <button class="filter-btn active" data-filter="all">ALL</button>
          <button class="filter-btn" data-filter="obs">OBS</button>
          <button class="filter-btn" data-filter="jellyfin">JELLYFIN</button>
          <button class="filter-btn" data-filter="sound">SOUND</button>
          <button class="filter-btn" data-filter="err">ERRORS</button>
        </div>
      </div>
    </div>

    <!-- Right: log -->
    <div class="panel log-panel">
      <div id="log-container">
        <div style="font-family:var(--mono);font-size:0.72rem;color:var(--muted);padding:1rem 0;">
          Waiting for commands...
        </div>
      </div>
    </div>
  </div>

  <script>
    let ws;
    let totalCommands = 0;
    let totalErrors = 0;
    let activeFilter = 'all';
    let currentSong = null;
    let songPollInterval;

    function connect() {
      ws = new WebSocket(`ws://${location.host}`);

      ws.onopen = () => {
        document.getElementById('ws-dot').classList.add('live');
        document.getElementById('ws-label').textContent = 'live';
      };

      ws.onclose = () => {
        document.getElementById('ws-dot').classList.remove('live');
        document.getElementById('ws-label').textContent = 'reconnecting';
        setTimeout(connect, 3000);
      };

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.event === 'init') {
          updateService('obs', data.obs.connected);
          updateService('jellyfin', data.jellyfin.connected);
          data.log.forEach(entry => renderLog(entry, false));
          totalCommands = data.log.length;
          totalErrors = data.log.filter(l => !l.ok).length;
          updateStats();
        } else if (data.event === 'status') {
          updateService(data.service, data.connected);
        } else if (data.event === 'log') {
          addLog(data.entry);
        }
      };
    }

    function updateService(service, connected) {
      const card = document.getElementById(`${service === 'jellyfin' ? 'jf' : service}-card`);
      const badge = document.getElementById(`${service === 'jellyfin' ? 'jf' : service}-badge`);
      const detail = document.getElementById(`${service === 'jellyfin' ? 'jf' : service}-detail`);

      card.className = `service-card ${connected ? 'connected' : 'disconnected'}`;
      badge.className = `badge ${connected ? 'ok' : 'err'}`;
      badge.textContent = connected ? 'ONLINE' : 'OFFLINE';

      if (service === 'jellyfin') {
        detail.textContent = connected ? 'Connected — polling every 30s' : 'Unreachable';
        if (connected) startSongPoll();
        else {
          clearInterval(songPollInterval);
          document.getElementById('now-playing-text').textContent = '—';
        }
      }
    }

    function startSongPoll() {
      fetchSong();
      clearInterval(songPollInterval);
      songPollInterval = setInterval(fetchSong, 15000);
    }

    async function fetchSong() {
      try {
        const res = await fetch('/media', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'song' })
        });
        const data = await res.json();
        const el = document.getElementById('now-playing-text');
        if (data.nothing || !data.song) {
          el.textContent = 'Nothing playing';
          currentSong = null;
        } else {
          el.textContent = data.song;
          currentSong = data.song;
        }
      } catch {
        document.getElementById('now-playing-text').textContent = 'Could not reach Jellyfin';
      }
    }

    function addLog(entry) {
      // Remove placeholder
      const placeholder = document.querySelector('#log-container > div');
      if (placeholder && !placeholder.classList.contains('log-entry')) placeholder.remove();

      totalCommands++;
      if (!entry.ok) totalErrors++;
      updateStats();

      renderLog(entry, true);
    }

    function renderLog(entry, prepend) {
      const container = document.getElementById('log-container');
      const time = new Date(entry.time).toLocaleTimeString('en-US', { hour12: false });

      const el = document.createElement('div');
      el.className = `log-entry ${entry.ok ? 'ok' : 'err'}`;
      el.dataset.type = entry.type;
      el.dataset.ok = entry.ok;
      if (prepend) el.classList.add('pulse');

      el.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-type ${entry.type}">${entry.type.toUpperCase()}</span>
        <span class="log-command">${entry.command}</span>
        <span class="log-detail" title="${entry.detail}">${entry.detail}</span>
        <span class="log-status ${entry.ok ? 'ok' : 'err'}">${entry.ok ? '✓' : '✗'}</span>
      `;

      applyFilter(el);

      if (prepend) {
        container.prepend(el);
      } else {
        container.append(el);
      }
    }

    function applyFilter(el) {
      if (activeFilter === 'all') {
        el.classList.remove('hidden');
      } else if (activeFilter === 'err') {
        el.classList.toggle('hidden', el.dataset.ok === 'true');
      } else {
        el.classList.toggle('hidden', el.dataset.type !== activeFilter);
      }
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = totalCommands;
      document.getElementById('stat-errors').textContent = totalErrors;
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        document.querySelectorAll('.log-entry').forEach(applyFilter);
      });
    });

    connect();
  </script>
</body>
</html>
